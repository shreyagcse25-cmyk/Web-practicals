<div class = " easygame">
<body bgcolor="lightblue">

<h2>Scholarship Registration Form</h2>

<form>

<fieldset>
<legend>Personal Details</legend>

Name:
<input type="text" name="name" placeholder="Enter your full name"><br><br>

Email:
<input type="email" name="email" placeholder="Enter your email"><br><br>

Phone Number:
<input type="text" name="phone" placeholder="Enter your phone number"><br><br>

Gender:
<input type="radio" name="gender" value="male"> Male
<input type="radio" name="gender" value="female"> Female
<input type="radio" name="gender" value="other"> Other

</fieldset>

<br>

<fieldset>
<legend>Education <del></del></legend>

Branch:
<select name="branch">
<option>Select Branch</option>
<option>Computer Science</option>
<option>Information Technology</option>
<option>Mechanical</option>
<option>Electrical</option>
<option>Civil</option>
</select>

<br><br>

Year:
<select name="year">
<option>Select Year</option>
<option>1st Year</option>
<option>2nd Year</option>
<option>3rd Year</option>
<option>4th Year</option>
</select>

</fieldset>

<br>

<fieldset>
<legend>Other Details</legend>

Caste:
<input type="radio" name="caste"> SC
<input type="radio" name="caste"> ST
<input type="radio" name="caste"> OBC
<input type="radio" name="caste"> General

<br><br>

Documents Submitted:
<br>
<input type="checkbox"> Aadhaar Card<br>
<input type="checkbox"> Marksheet<br>
<input type="checkbox"> caste certificate/validity

</fieldset>

<br>

<input type="submit" value="Submit">
<input type="reset" value="Reset">

</form>
</div>
</body>
</html>
