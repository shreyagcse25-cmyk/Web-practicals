    <body bgcolor="Lightblue">
    <h1 align="Centre"> Dance Auditions Registration Form </h1>
    <form>
    <fieldset>
    <legend> Applicant Details</legend>
    Full Name: <input type="text" name="name"> <br> <br>
    Date of Birth: <input type="date" name="dob"> <br> <br>
    Email: <input type="email" name="email"> <br> <br>
    Mobile Number: <input type="text" name="mobile"> <br> <br>
    Gender: <input type="radio" name="gender"> Male <br>
            <input type="radio" name="gender"> Female <br>
            <input type="radio" name="gender"> Other <br> <br>
    City: <input type="text" name="city"> <br> <br>
    State: <input type="text" name="state"> <br> <br>
    </fieldset>
    <br>
    <fieldset>
    <legend> Performance Details </legend>
    Dance Form: <select name="Dance Form">
                <option> Select Form </option>
                <option> HipHop </option>
                <option> Classical </option>
                <option> Bollywood </option>
                <option> Semi Classical </option>
                <option> Other </option>
                </select>
    <br> <br>
    Song Duration: <input type="text" name="duration"> <br> <br>
    Costume: <input type="text" name="costume"> <br> <br>
    </fieldset>
    <br>
    <input type="Submit" value="Submit">
    <input type="Reset" value="Reset">
    </form>
